<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bookmark Swap</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <img src="icon48.png" alt="" class="popup-header-icon">
      <span class="popup-header-title">Bookmark Swap</span>
    </div>

    <div id="firstTimeMessage" class="welcome-card" style="display: none;">
      <div class="welcome-icon">👋</div>
      <strong>Welcome to Bookmark Swap!</strong>
      <p>Select a profile below to assign your current bookmarks to it.</p>
      <p class="welcome-warning">⚠️ Switching profiles will replace your current bookmark bar. We recommend exporting a backup of all your bookmarks first.</p>
      <button id="popupExportBtn" class="export-backup-btn">⬇ Export Bookmarks</button>
    </div>

    <div id="activeCard" class="active-profile-card">
      <div class="active-label">Active Profile</div>
      <div class="active-profile-display">
        <span id="activeEmoji" class="active-emoji">📁</span>
        <div class="active-details">
          <span id="activeProfileName" class="active-name">None</span>
          <span id="bookmarkCount" class="active-meta">—</span>
        </div>
      </div>
    </div>

    <div class="section-label">Switch To</div>

    <div id="profileList" class="profile-list">
      <!-- Profiles will be dynamically added here -->
    </div>

    <div class="popup-footer">
      <button id="manageBtn" class="manage-link">⚙️ Manage Profiles</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
